{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                            <i class="fa-solid fa-user-circle fa-4x text-primary"></i>
                        </div>
                        <h3 class="fw-bold">Welcome Back</h3>
                        <p class="text-muted">Login to SRMAP Events</p>
                    </div>
                    
                    <form action="{{ url_for('login') }}" method="POST" class="needs-validation" novalidate>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-uppercase text-muted">Email or Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-primary"></i></span>
                                <input type="text" name="email" class="form-control" required placeholder="student@srmap.edu.in or admin">
                                <div class="invalid-feedback">Please enter valid credentials.</div>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold small text-uppercase text-muted">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-primary"></i></span>
                                <input type="password" name="password" class="form-control" required placeholder="••••••••">
                                <div class="invalid-feedback">Please enter your password.</div>
                            </div>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm">Login</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="mb-0 text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">Register Student</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
